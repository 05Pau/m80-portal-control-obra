name: Sync Smartsheet data

on:
  schedule:
    - cron: '0 * * * *'   # cada hora, en punto
  workflow_dispatch: {}    # permite lanzarlo manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ejecutar sincronización
        env:
          SMARTSHEET_TOKEN: ${{ secrets.SMARTSHEET_TOKEN }}
        run: node scripts/sync-smartsheet.js

      - name: Commit y push si data.json cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Sync Smartsheet data [automated]"
          git push
